workflows:
  android-gdrive:
    name: Build from Google Drive
    scripts:
      - name: Download project
        script: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1Mv2hD43f-l5QF2ujvTYa3K7GDM7zkVI9" -O project.zip
          unzip project.zip -d project
          ls project

      - name: Find project root
        script: |
          BUILD_FILE=$(find project -name "build.gradle" | head -1)
          PROJECT_ROOT=$(dirname $BUILD_FILE)
          echo "Found at: $PROJECT_ROOT"
          echo $PROJECT_ROOT > /tmp/project_root.txt

      - name: Set SDK
        script: |
          PROJECT_ROOT=$(cat /tmp/project_root.txt)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$PROJECT_ROOT/local.properties"

      - name: Build APK
        script: |
          PROJECT_ROOT=$(cat /tmp/project_root.txt)
          cd $PROJECT_ROOT
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - project/**/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - aprianreza705@gmail.com
