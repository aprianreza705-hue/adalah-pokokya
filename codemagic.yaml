workflows:
  android-gdrive:
    name: Build from Google Drive
    environment:
      java: 17
    scripts:
      - name: Download project
        script: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1Mv2hD43f-l5QF2ujvTYa3K7GDM7zkVI9" -O project.zip
          unzip project.zip -d project

      - name: Fix & Build
        script: |
          cd project/8bp-guideline

          # Fix manifest - hapus tag <package> yang invalid
          MANIFEST="app/src/main/AndroidManifest.xml"
          echo "=== ISI MANIFEST SEBELUM FIX ==="
          cat $MANIFEST

          # Hapus baris yang mengandung <package> tag
          sed -i '' '/<package/d' $MANIFEST || sed -i '/<package/d' $MANIFEST

          echo "=== ISI MANIFEST SETELAH FIX ==="
          cat $MANIFEST

          # Setup gradle
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew gradlew.bat
          brew install gradle@7
          export PATH="/opt/homebrew/opt/gradle@7/bin:$PATH"
          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          ./gradlew assembleDebug

    artifacts:
      - project/**/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - aprianreza705@gmail.com
