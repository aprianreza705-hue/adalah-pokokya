workflows:
  android-gdrive:
    name: Build from Google Drive
    environment:
      java: 17
    scripts:
      - name: Download project
        script: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1Mv2hD43f-l5QF2ujvTYa3K7GDM7zkVI9" -O project.zip
          unzip project.zip -d project

      - name: Fix & Build
        script: |
          cd project/8bp-guideline
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          # Hapus gradle wrapper lama yang corrupt
          rm -rf gradle/wrapper/gradle-wrapper.jar

          # Install gradle dan regenerate wrapper
          brew install gradle
          gradle wrapper --gradle-version 7.6.1

          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - project/**/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - aprianreza705@gmail.com
