workflows:
  android-gdrive:
    name: Build from Google Drive
    scripts:
      - name: Download project
        script: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1Mv2hD43f-l5QF2ujvTYa3K7GDM7zkVI9" -O project.zip
          unzip project.zip -d project

      - name: Check structure
        script: |
          echo "=== ISI FOLDER ==="
          find project -maxdepth 3 -type f | head -50

      - name: Find & Set root
        script: |
          GRADLEW=$(find project -name "gradlew" | head -1)
          if [ -z "$GRADLEW" ]; then
            echo "gradlew tidak ditemukan, cari build.gradle..."
            BUILD=$(find project -name "build.gradle" | grep -v "/build/" | head -1)
            PROJECT_ROOT=$(dirname $BUILD)
          else
            PROJECT_ROOT=$(dirname $GRADLEW)
          fi
          echo "Project root: $PROJECT_ROOT"
          echo $PROJECT_ROOT > /tmp/project_root.txt

      - name: Generate gradlew if missing
        script: |
          PROJECT_ROOT=$(cat /tmp/project_root.txt)
          cd $PROJECT_ROOT
          if [ ! -f "gradlew" ]; then
            echo "Generating gradlew..."
            gradle wrapper --gradle-version 7.5
          fi
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK
        script: |
          PROJECT_ROOT=$(cat /tmp/project_root.txt)
          cd $PROJECT_ROOT
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - project/**/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - lialia123ptk@gmail.com
