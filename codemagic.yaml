workflows:
  android-gdrive:
    name: Build from Google Drive
    environment:
      java: 17
    scripts:
      - name: Download project
        script: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1Mv2hD43f-l5QF2ujvTYa3K7GDM7zkVI9" -O project.zip
          unzip project.zip -d project

      - name: Fix & Build
        script: |
          cd project/8bp-guideline

          # Fix 1: Hapus <package> tag invalid di manifest
          sed -i '/<package/d' app/src/main/AndroidManifest.xml

          # Fix 2: Lihat baris 127 BallDetector.kt
          echo "=== BARIS SEKITAR 127 ==="
          sed -n '124,130p' app/src/main/java/com/guideline/pool/detection/BallDetector.kt

          # Fix 3: Tambah 'f' suffix ke literal Double di baris 127 agar jadi Float
          sed -i '127s/\([0-9]\+\.[0-9]\+\)\([^f]\)/\1f\2/g' app/src/main/java/com/guideline/pool/detection/BallDetector.kt

          echo "=== SETELAH FIX ==="
          sed -n '124,130p' app/src/main/java/com/guideline/pool/detection/BallDetector.kt

          # Setup gradle
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew gradlew.bat
          brew install gradle@7
          export PATH="/opt/homebrew/opt/gradle@7/bin:$PATH"
          gradle wrapper --gradle-version 7.6.1
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          ./gradlew assembleDebug

    artifacts:
      - project/**/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - aprianreza705@gmail.com
